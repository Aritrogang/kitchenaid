name: CI

on:
  push:
    branches: [main]
  pull_request:

# The whole suite is designed to run KEYLESS: no ANTHROPIC_API_KEY is set here, so the
# creative/LLM paths deterministically fall back to the corpus and CI never makes a paid
# call. The safety gate is exercised entirely offline.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit + property tests
        run: python -m pytest -q

      - name: Safety eval (0 unsafe approvals, coverage floor)
        # Fails the build on any mis-resolution, unsafe approval, or coverage drop.
        run: python -m kitchenaid.eval_harness

  db-tests:
    name: db-tests (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kitchenaid
          POSTGRES_PASSWORD: kitchenaid
          POSTGRES_DB: kitchenaid
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kitchenaid:kitchenaid@localhost:5432/kitchenaid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (dev + db extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,db]"
      - name: Run migrations
        run: python -m kitchenaid.store migrate
      - name: Postgres-backed persistence tests
        run: python -m pytest tests/test_store_postgres.py -q

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t kitchenaid-api .
      - name: Smoke-test the image imports and serves
        run: |
          docker run --rm kitchenaid-api python -c "import kitchenaid.api; print('api import ok')"
          docker run --rm -d --name kaid -p 8000:8000 kitchenaid-api
          for i in $(seq 1 15); do
            curl -fsS http://localhost:8000/health && break || sleep 2
          done
          curl -fsS http://localhost:8000/health
          docker rm -f kaid
