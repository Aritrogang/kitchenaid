name: CI

on:
  push:
    branches: [main]
  pull_request:

# The whole suite is designed to run KEYLESS: no ANTHROPIC_API_KEY is set here, so the
# creative/LLM paths deterministically fall back to the corpus and CI never makes a paid
# call. The safety gate is exercised entirely offline.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit + property tests
        run: python -m pytest -q

      - name: Safety eval (0 unsafe approvals, coverage floor)
        # Fails the build on any mis-resolution, unsafe approval, or coverage drop.
        run: python -m kitchenaid.eval_harness
