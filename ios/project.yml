# XcodeGen spec — generates Kitchenaid.xcodeproj from the Sources tree.
#
#   Install:   brew install xcodegen
#   Generate:  cd ios && xcodegen generate
#   Open:      open Kitchenaid.xcodeproj
#
# Regenerate any time you add/remove/rename source files. See README.md.

name: Kitchenaid

options:
  bundleIdPrefix: com.kitchenaid
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    # A team is required to run on a physical device. Leave empty for the
    # Simulator, or set DEVELOPMENT_TEAM to your 10-char Apple team id.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Kitchenaid:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Kitchenaid
    info:
      path: Kitchenaid/Resources/Info.plist
      properties:
        CFBundleDisplayName: kitchenaid
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kitchenaid.app
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        # Keep the SwiftUI previews and app happy on the Simulator without signing.
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
